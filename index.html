<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5/build/qrcode.min.js"></script>

<div class="xlm-box" data-destination="YOUR_STELLAR_ADDRESS_HERE" data-memo="Tip">
  <input class="xlm-amount" inputmode="decimal" value="1" placeholder="XLM amount">
  <button class="xlm-btn">Send XLM</button>
  <canvas class="xlm-qr" hidden></canvas>
  <div class="xlm-msg"></div>
</div>

<style>
.xlm-box{font:14px sans-serif;max-width:300px;margin:20px auto;text-align:center}
.xlm-box input,.xlm-box button{box-sizing:border-box;width:100%;padding:10px;margin:6px 0;border-radius:6px}
.xlm-box input{border:1px solid #ccc}
.xlm-box button{border:0;background:#111;color:#fff;cursor:pointer}
.xlm-qr{margin-top:12px}
.xlm-msg{color:#b00020}
</style>

<script>
(() => {
  const STROOP = 10000000n;
  const MAX = 100000n * STROOP;

  document.querySelectorAll(".xlm-box").forEach(box => {
    box.querySelector(".xlm-btn").onclick = () => {
      const msg = box.querySelector(".xlm-msg");
      const qr = box.querySelector(".xlm-qr");
      msg.textContent = "";
      qr.hidden = true;

      try {
        const amount = normalize(box.querySelector(".xlm-amount").value);
        const destination = box.dataset.destination;
        if (!/^G[A-Z2-7]{55}$/.test(destination)) throw Error("Invalid Stellar address");

        const p = new URLSearchParams({ destination, amount });
        if (box.dataset.memo) {
          p.set("memo", box.dataset.memo.slice(0, 28));
          p.set("memo_type", "MEMO_TEXT");
        }

        const uri = "web+stellar:pay?" + p.toString();
        const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (mobile) location.href = uri;
        else QRCode.toCanvas(qr, uri, { width: 220 }, err => {
          if (err) throw err;
          qr.hidden = false;
        });
      } catch (e) {
        msg.textContent = e.message;
      }
    };
  });

  function normalize(v) {
    v = String(v).trim().replace(/,/g, "");
    if (!/^\d+(\.\d{1,7})?$/.test(v)) throw Error("0.0000001〜100000");
    const [a, b = ""] = v.split(".");
    const n = BigInt(a) * STROOP + BigInt((b + "0000000").slice(0, 7));
    if (n < 1n || n > MAX) throw Error("0.0000001〜100000 XLM");
    const i = n / STROOP, f = n % STROOP;
    return f ? `${i}.${String(f).padStart(7, "0").replace(/0+$/, "")}` : String(i);
  }
})();
</script>
