<div style="font-family: sans-serif; max-width: 300px; margin: 20px auto; text-align: center; border: 1px solid #eee; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <div style="margin-bottom: 15px; text-align: left;">
        <label for="stellar-amount" style="font-size: 14px; color: #555; display: block; margin-bottom: 5px; font-weight: bold;">Ammount XLM</label>
        <input type="number" id="stellar-amount" value="1" min="0.0000001" step="any" style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
    </div>
    
    <button id="stellar-pay-btn" style="background-color: #0866ff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">
        Sent XLM
    </button>
    <canvas id="qrcode-canvas" style="margin-top: 15px; display: none; border: 1px solid #ccc; padding: 10px; border-radius: 8px; width: 200px; height: 200px; margin-left: auto; margin-right: auto;"></canvas>
</div>

<script>
(() => {
    const btn = document.getElementById('stellar-pay-btn');
    const amountInput = document.getElementById('stellar-amount');
    const qrcodeContainer = document.getElementById('qrcode-container');
    const qrcodeImg = document.getElementById('qrcode-img');
    const errorDiv = document.getElementById('stellar-error-msg');

    if (!btn || !amountInput || !qrcodeContainer || !qrcodeImg || !errorDiv) return;

    btn.addEventListener('click', () => {
        errorDiv.style.display = "none";
        errorDiv.innerText = "";
        qrcodeContainer.style.display = "none";

        const destination = "YOUR_STELLAR_ADDRESS_HERE"; 
        
        const amount = amountInput.value; 
        if (!amount || parseFloat(amount) <= 0) {
            errorDiv.innerText = "Error:Enter a number greater than 0";
            errorDiv.style.display = "block";
            return;
        }

        // memo up to 28 characters
        const memo = "Tip"; 
        
        const stellarUri = `web+stellar:pay?destination=${destination}&amount=${amount}&memo=${encodeURIComponent(memo)}&memo_type=MEMO_TEXT`;
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = stellarUri;
        } else {
            try {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(stellarUri)}`;
                qrcodeImg.src = qrUrl;
                qrcodeContainer.style.display = "block"; 
            } catch (err) {
                errorDiv.innerText = "failed gen QR";
                errorDiv.style.display = "block";
                console.error(err);
            }
        }
    });
})();
</script>
